<section id="recommendations">
    <h2>Recommendations</h2>

    <!-- Existing recommendations -->
    <ul id="rec-list">
        <li>Hema is a dedicated learner.</li>
        <li>Great at web development basics.</li>
    </ul>

    <!-- Input box -->
    <input type="text" id="newRec" placeholder="Write a recommendation">
    
    <!-- Button -->
    <button onclick="addRecommendation()">Add Recommendation</button>
</section>

<script>
function addRecommendation() {
    var input = document.getElementById("newRec");
    var text = input.value;

    if (text === "") {
        alert("Please enter a recommendation");
        return;
    }

    var li = document.createElement("li");
    li.textContent = text;

    document.getElementById("rec-list").appendChild(li);

    input.value = "";
}
</script>
